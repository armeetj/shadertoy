<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLSL Notebook</title>
    <link data-trunk rel="rust" data-wasm-opt="0" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #1d2021;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="the_canvas_id"></canvas>
    <script>
        // Prevent browser default Tab behavior (focus change) but let the event
        // propagate so eframe/egui on the canvas still receives the key event.
        document.addEventListener("keydown", function(e) {
            if (e.key === "Tab") {
                e.preventDefault();
            }
        }, true);
    </script>
</body>
</html>
